<div id="game-container">
  <div id="player"></div>
  
  <div id="choices" style="display:none;">
    <h3>What do you want to do?</h3>
    <button onclick="makeChoice('VIDEO_ID_B')">Investigate the Cave</button>
    <button onclick="makeChoice('VIDEO_ID_C')">Return to Town</button>
  </div>
</div>

<script>
  var player;
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '390',
      width: '640',
      videoId: 'VIDEO_ID_A', // Your starting video
      events: {
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerStateChange(event) {
    // YT.PlayerState.ENDED is triggered when the video hits the last second
    if (event.data == YT.PlayerState.ENDED) {
      document.getElementById('choices').style.display = 'block';
    }
  }

  function makeChoice(nextVideoId) {
    document.getElementById('choices').style.display = 'none';
    player.loadVideoById(nextVideoId);
  }
</script>
